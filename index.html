<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASEAN Vocab Passport</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>🌏 ASEAN Vocab Passport</h1>

    <p>Learn English through ASEAN Football</p>

</header>

<main>

    <!-- Passport -->

    <section id="quiz-area">

        <div class="passport-card">

            <div class="passport-cover">

                <div class="passport-title" id="passport-title"></div>

                <div class="passport-subtitle" id="passport-subtitle"></div>

                <button class="start-btn" id="start-btn"></button>

            </div>

        </div>

    </section>


    <!-- Question -->

    <section id="question-screen" style="display:none;">

        <h2 id="question-text"></h2>

        <div id="answer-list"></div>

    </section>


    <!-- Reward Screen -->

    <section id="reward-screen" style="display:none;">

        <!-- Stamp Layer -->

        <div id="passport-stamp">

            PERFECT

        </div>

        <h1 id="reward-title"></h1>

        <p id="reward-message"></p>

        <div id="reward-score"></div>

        <button id="reward-btn" class="start-btn">

            Back to Passport

        </button>

    </section>

</main>

<script src="theme.js"></script>
<script src="questions.js"></script>
<script src="script.js"></script>

</body>

</html>
